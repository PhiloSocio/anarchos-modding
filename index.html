<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnArchos Modding | Official Links</title>

  <style>
    :root {
      --bg-color: #0d0f12;
      --card-bg: #161920;
      --card-hover: #212633;
      --border-color: #2a303f;
      --text-color: #f0f2f5;
      --subtext-color: #94a3b8;
      --accent-color: #6366f1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .profile-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid var(--accent-color);
      margin-bottom: 16px;
      object-fit: cover;
      background-color: var(--card-bg);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    p.bio {
      color: var(--subtext-color);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--subtext-color);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .lang-btn.active, .lang-btn:hover {
      background: var(--accent-color);
      color: #fff;
      border-color: var(--accent-color);
    }

    .links-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
    }

    .link-card:hover {
      background: var(--card-hover);
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }

    .link-label {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .svg-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
      transition: color 0.2s ease;
    }

    .arrow-icon {
      color: var(--subtext-color);
      font-size: 0.9rem;
    }

    footer {
      margin-top: 36px;
      font-size: 0.8rem;
      color: var(--subtext-color);
    }
  </style>
</head>

      const data = translations[lang];
      if (!data) return;

      document.getElementById('bio-text').textContent = data.bio;

      document.getElementById('link-patreon').textContent = data.patreon;

      document.getElementById('link-youtube').textContent = data.youtube;

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase() === lang) {
          btn.classList.add('active');
        }
